name = "orchestra"
version = "0.1.0"
defaultTargets = ["orchestra", "orchestra-mcp-test", "listener-config-test", "stream-format-test"]

[[require]]
name = "Cli"
git = "https://github.com/leanprover/lean4-cli.git"
rev = "main"

[[lean_lib]]
name = "Orchestra"

[[lean_exe]]
name = "orchestra"
root = "Main"

[[lean_exe]]
name = "orchestra-mcp-test"
root = "McpTest"

[[lean_exe]]
name = "listener-config-test"
root = "ListenerConfigTest"

[[lean_exe]]
name = "stream-format-test"
root = "StreamFormatTest"


