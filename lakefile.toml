name = "orchestra"
version = "0.1.0"
defaultTargets = ["orchestra", "orchestra-mcp-test"]
testDriver = "orchestraTest"

[[require]]
name = "Cli"
git = "https://github.com/leanprover/lean4-cli.git"
rev = "main"

[[lean_lib]]
name = "Orchestra"

[[lean_lib]]
name = "Test"

[[lean_exe]]
name = "orchestra"
root = "Main"

[[lean_exe]]
name = "orchestra-mcp-test"
root = "McpTest"

[[lean_exe]]
name = "orchestraTest"
root = "TestDriver"
