image:
  distribution: nixos
  release: 25.11

source:
  downloader: nixos-http

targets:
  lxc:
    create_message: |
      You just created an {{ image.description }} container.

    config:
    - type: all
      after: 4
      content: |-
        lxc.include = LXC_TEMPLATE_CONFIG/common.conf

    - type: user
      after: 4
      content: |-
        lxc.include = LXC_TEMPLATE_CONFIG/userns.conf

    - type: all
      content: |-
        lxc.arch = {{ image.architecture_kernel }}

packages:
  custom_manager:
    clean:
      cmd: true
    install:
      cmd: true
    remove:
      cmd: true
    refresh:
      cmd: true
    update:
      cmd: true

files:
  - name: conf-hostname
    path: /etc/nixos/incus.nix
    generator: template
    content: |-
      {
        lib,
        config,
        pkgs,
        ...
      }:

      # WARNING: THIS CONFIGURATION IS AUTOGENERATED AND WILL BE OVERWRITTEN AUTOMATICALLY

      let
        unstable = import
          (builtins.fetchTarball https://github.com/nixos/nixpkgs/tarball/5b2c2d84341b2afb5647081c1386a80d7a8d8605)
          # reuse the current configuration
          { config = config.nixpkgs.config; };
      in
      {
        networking.hostName = "{{ instance.name }}";

        nixpkgs.config.allowUnfree = true;

        environment.systemPackages = with pkgs; [
          vim
          man
          unstable.claude-code
          elan
          git
          gh
          yq
          jwt-cli
          jq
          openssl
          landrun
          opencode
          unstable.mistral-vibe
        ];

        users.users.orchestra = {
          isNormalUser = true;
        };

        users.users."orchestra".openssh.authorizedKeys.keys = [
          "your public key here"
        ];

        services.openssh.enable = true;
      }
